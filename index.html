<script type="module">
class IdleTabAICoordinator {
  #data;
  #nodes;

  constructor(worker) {
    // data
    this.#data = {
      controller: '',
      id: 'tab_' + Math.random().toString(36).substr(2, 9),
      objectURL: ''
    };

    // nodes
    this.#nodes = {
      worker: document.querySelector('msc-shared-worker'),
      picker: document.querySelector('.product-vision-picker'),
      input: document.querySelector('input[name=product-vision]'),
      vision: document.querySelector('.product-vision'),
      dialog: document.querySelector('msc-dialogs'),
      triggerAdd: document.querySelector('.trigger-add')
    };

    // evts
    this._handler = this._handler.bind(this);
    this._onMessage = this._onMessage.bind(this);
    this._onInput = this._onInput.bind(this);
    this._onAddTab = this._onAddTab.bind(this);
  }

  connect() {
    const { worker, input, triggerAdd } = this.#nodes;
    this.#data.controller = new AbortController();
    const signal = this.#data.controller.signal;

    // evts
    ['msc-shared-worker-message', 'msc-shared-worker-error'].forEach(
      (event) => {
        worker.addEventListener(event, this._handler, { signal });
      }
    );

    ['beforeunload', 'visibilitychange', 'focus'].forEach(
      (event) => {
        window.addEventListener(event, this._handler, { signal });
      }
    );

    input.addEventListener('input', this._onInput, { signal });
    triggerAdd.addEventListener('click', this._onAddTab, { signal });

    // REGISTER
    worker.postMessage({ type:'REGISTER', id: this.#data.id });
    this._handler({type: 'visibilitychange'});
  }

  #disconnect() {
    this.#data.controller?.abort();
    this.#nodes.worker.postMessage({ type:'CLOSING', id: this.#data.id });
  }

  async _onMessage(data) {
    const { id } = this.#data;
    const { worker } = this.#nodes;
    const { type, payload = {} } = data;

    switch (type) {
      case 'PING': {
        worker.postMessage({ type:'PONG', id });
        break;
      }

      case 'AI_INFERENCE_DISPATCH_BK': {
        const { type } = payload;
        let result = '';

        // on-device ai stuff
        try {
          const session = await LanguageModel.create();
          result = await session.prompt('Write me a poem!');

          console.log(result);
        } catch(err) {}

        worker.postMessage({
          type:'AI_INFERENCE_FINISH',
          id,
          payload: {
            type,
            result
          }
        });
        break;
      }

      case 'AI_INFERENCE_DISPATCH': {
        const { type, config, params } = payload;
        let result = {};
        const ai = document.createElement('msc-built-in-ai-prompt');
        document.body.appendChild(ai);

        console.log('Current tab is executing on-device AI analysis...');

        try {
          await ai.create(config);
          result = await ai.prompt(...params);
          result = JSON.parse(result);
          ai.remove();
        } catch(err) {
          console.log(err);
        }

        console.log('On-device AI analysis completed.');

        worker.postMessage({
          type:'AI_INFERENCE_FINISH',
          id,
          payload: {
            id: payload.id,
            type,
            result
          }
        });
        break;
      }

      case 'AI_RESULT_BROADCAST': {
        console.log('AI_RESULT_BROADCAST', payload);

        const { picker, vision } = this.#nodes;
        const {
          result: {
            product,
            isViolating,
            reason,
            confidence
          } = {}
        } = payload;

        picker.inert = false;
        vision.classList.toggle('product-vision--show', false);

        // dialog
        const { dialog } = this.#nodes;
        const img = dialog.querySelector('.my-content-wrap__vision img');
        const sign = dialog.querySelector('.my-content-wrap__vision__sign');
        const intro = dialog.querySelector('.pretty-paragraph');

        img.src = this.#data.objectURL;
        sign.dataset.status = isViolating ? 'fail' : 'pass';
        intro.textContent = product;

        dialog.showModal();
        break;
      }

      case 'SYSTEM_WORKER_DYING':
        console.log('SYSTEM_WORKER_DYING');
        break;
    }
  }

  _handler(evt) {
    const { id } = this.#data;
    const { worker } = this.#nodes;
    const { type } = evt;

    switch (type) {
      case 'beforeunload': {
        this.#disconnect();
        break;
      }

      case 'focus':
      case 'visibilitychange': {
        const status = document.visibilityState === 'visible' ? 'active' : 'background';
        
        worker.postMessage(
          {
            type: 'STATUS_UPDATE',
            id,
            payload: { status }
          }
        );
        break;
      }

      case 'msc-shared-worker-message': {
        this._onMessage(structuredClone(evt.detail));
        break;
      }

      case 'msc-shared-worker-error':
        console.log('msc-shared-worker-error');
        break;
    }
  }

  _onAddTab() {
    window.open(window.location.href, '_blank');
  }

  async _onInput(evt) {
    const { files } = evt.target;

    if (!files.length) {
      return;
    }

    const { picker, worker, vision, input } = this.#nodes;
    const { id } = this.#data;
    const blob = files[0];

    const config = {
      initialPrompts: [
        {
          role: 'system',
          content:
            'You are a skilled analyst who correlates patterns across multiple images.',
        },
      ],
      expectedInputs: [{ type: 'image' }],
      multimodal: [
        {
          role: 'user',
          content: [
            {
              type: 'text',
              value: `Here's one image.`,
            },
            { type: 'image', value: blob },
          ],
        },
      ]
    };

    const params = [
`

# 核心審查原則（嚴格依此順序執行，違者重罰）

## 【第 0 步：全宇宙最高優先級 - 絕對合法白名單（直接放行防線）】
當圖片一進來，你必須先檢查是否屬於以下品類。**只要符合，必須直接判定為安全（isViolating: false, confidence: 0.0），並立刻強制結束審查，絕對不允許比對後方的違禁品特徵與規則 B！**

1. **常規生活與美髮家電類**：
   - 包含**「Dyson 吹風機（不論是中空圓筒、T字型、或帶有任何彎曲狀/長條狀的吹嘴配件）」**、捲髮棒、電動牙刷、吸塵器。
   - **【鋼鐵律令】**：Dyson 吹風機的各式造型吹嘴（包含防飛翹的彎曲吹嘴）與粗大電源線，是標準的家電配件。**嚴禁將吹風機的任何配件、出風口或幾何結構誤判為電子煙的吸嘴！**
2. **服飾、鞋履與時尚配件類**：
   - 包含高跟鞋、平底鞋、樂福鞋、衣服、包包。鞋面上的金屬扣裝飾嚴禁誤判為吸嘴或刀械。
3. **常規 3C 電子與遊戲主機**：
   - 標準的電視遊樂器（如 PS5 Pro、Xbox）、顯示卡、路由器。其身上的散熱格柵與線條嚴禁誤判為刀械或槍砲。
4. **日常食品與兒童玩具類**：
   - 食用油（橄欖油瓶）、醬油瓶、哥吉拉等怪獸模型（其背刺與尖牙嚴禁誤判為刀械）。

*(說明：只要在此步驟確認是上述日常商品，代表它是 100% 合法，請帶著人類的常識直接給出 false，後面的規避收網規則對其完全無效。)*

---

## 【第 1 步：偽裝型/隱蔽型電子煙的反規避收網（僅在第 0 步未觸發時適用）】
如果物件**完全不屬於**上述第 0 步的常規家電、鞋子、食品、玩具，且它同時滿足以下兩大特徵，才可判定為違規（isViolating: true）：
1. **視覺結構**：主機頂端帶有明顯供人嘴唇含住吸食的「黑色或透明扁平/圓柱狀吸嘴」。
2. **文字鐵證（包含規避話術）**：文字明確印有【"霧化"、"本草霧化"、"草本霧化"、"霧量充足"、"零尼古丁"、"吸爽"、"煙彈"、"草本星球"、"CALM STAR"】或各式水果口味（如 Grape、Mint）字樣。

---

# 推理步驟 (Chain of Thought - 嚴格依序執行)
你必須在心裡按照以下步驟進行邏輯推導，嚴禁跳步驟：
1. **商業意圖第一識別**：客觀識別圖片中的物件。這張圖片的商品本質是什麼？
   - （例：這是一台深藍色的 Dyson 吹風機，附帶原廠的防飛翹彎曲吹嘴與電源線）。
2. **白名單優先攔截**：檢查它是否屬於【第 0 步：絕對合法白名單】的範疇？
   - *如果是* $\rightarrow$ **立刻停止所有武器與煙具的特徵比對**。強制輸出安全結論：\`isViolating\`: \`false\`，\`confidence\`: \`0.0\`。
   - *如果否* $\rightarrow$ 才允許進入【第 1 步】去檢查是否為偽裝型電子煙。
3. **結論輸出**：
   - 判定為安全：\`isViolating\` 為 \`false\`，\`confidence\` 必須絕對為 \`0.0\`。
   - 判定為違規：\`isViolating\` 為 \`true\`，\`confidence\` 必須大於 \`0.9\`。

# 輸出格式限制 (Response Constraint)
請嚴格遵守系統指定的 JSON 格式輸出結構。
